<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Web Dev Quiz</title>
<link rel="shortcut icon" href="./assets/quiz.png" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=JetBrains+Mono:wght@500;600&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="grid-floor"></div>

  <main>
    <header>
      <h1>WEB DEV QUIZ</h1>
      <p>10 questions on <span class="mono c1">HTML</span>, <span class="mono c2">CSS</span> &amp; <span class="mono c3">JS</span></p>
    </header>

    <!-- -------------------- Quiz Deck -------------------- -->
    <div class="deck-wrapper" id="deckWrapper">
      <div class="ghost-card g2" id="ghost2"></div>
      <div class="ghost-card g1" id="ghost1"></div>

      <div class="card quiz-card" id="quizCard">
        <div class="window-bar">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
          <span class="window-title mono">web-dev-quiz.html</span>
        </div>

        <div class="card-body" id="cardBody">
          <div class="quiz-meta">
            <span class="q-counter">Question 1 of 10</span>
            <span class="timer-chip mono" id="timerChip">15s</span>
          </div>

          <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>

          <span class="tag" id="categoryTag"></span>
          <p class="question-text" id="questionText"></p>
          <div class="options" id="optionsContainer"></div>

          <div class="quiz-footer">
            <div class="footer-row">
              <span class="remaining" id="remainingText"></span>
              <button class="primary" id="nextBtn" disabled>Next</button>
            </div>
            <div class="progress-segments" id="progressSegments"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- -------------------- Result Card -------------------- -->
    <div class="card result-card" id="resultCard">
      <div class="card-body">
        <p class="score-value" id="scoreValue">0/10</p>
        <p class="score-percent" id="scorePercent"></p>
        <p class="score-message" id="scoreMessage"></p>
        <button class="primary" id="retakeBtn">Retake Quiz</button>
      </div>
    </div>
  </main>

  <script src="./script.js"></script>
</body>
</html>
